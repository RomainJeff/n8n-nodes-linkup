name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint --no-error-on-unmatched-pattern --ignore-pattern '**/*.test.ts' --ignore-pattern 'vitest.config.ts' .

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
